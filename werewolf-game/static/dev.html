<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>狼人杀 Dev 快捷</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans", sans-serif;
        padding: 18px;
      }
      button {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        background: #f5f5f5;
        cursor: pointer;
      }
      .hint {
        margin-top: 10px;
        color: #444;
      }
      code {
        background: #f2f2f2;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h3>测试快捷入口</h3>
    <button id="open9">一键打开 9 个座位页</button>
    <button id="open12" style="margin-left: 10px;">一键打开 12 个座位页</button>
    <div class="hint">
      9 人局：会打开 9 个标签页（浏览器可能会拦弹窗，需要允许），并自动入座。房主为 1 号。
    </div>
    <div class="hint">
      12 人局：会打开 12 个标签页并自动入座。预设板子不再自动套用，由房主自行选择常用1/2 或手动配。
    </div>
    <div class="hint">入口：<code>/static/dev.html</code></div>

    <script>
      function openSeat(n) {
        const name = `${n}号`;
        const url = `/?auto=1&name=${encodeURIComponent(name)}&seat=${n}`;
        window.open(url, `_blank`);
      }
      function openSeatWithPreset(n, preset) {
        const name = `${n}号`;
        const extra = preset ? `&preset=${encodeURIComponent(preset)}` : "";
        const url = `/?auto=1&name=${encodeURIComponent(name)}&seat=${n}${extra}`;
        window.open(url, `_blank`);
      }
      document.getElementById("open9").onclick = () => {
        openSeatWithPreset(1, "");
        for (let i = 2; i <= 9; i++) openSeat(i);
      };
      document.getElementById("open12").onclick = () => {
        // 房主固定为 1 号
        openSeatWithPreset(1, "");
        for (let i = 2; i <= 12; i++) openSeat(i);
      };
    </script>
  </body>
</html>
